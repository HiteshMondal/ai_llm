app:
  name: "AI LLM RAG App"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

llm:
  provider: "ollama"           # ollama | openai | huggingface
  model: "llama3.2"
  temperature: 0.7
  max_tokens: 2048
  base_url: "http://localhost:11434"

embeddings:
  provider: "ollama"           # ollama | openai | sentence-transformers
  model: "nomic-embed-text"
  dimension: 768
  base_url: "http://localhost:11434"

vector_store:
  provider: "chroma"           # chroma | faiss | qdrant
  persist_dir: "./data/embeddings"
  collection_name: "documents"

ingestion:
  chunk_size: 512
  chunk_overlap: 64
  supported_formats:
    - ".pdf"
    - ".txt"
    - ".md"
    - ".docx"
  upload_dir: "./data/uploads"
  processed_dir: "./data/processed"
  raw_dir: "./data/raw"

cache:
  enabled: true
  dir: "./data/cache"
  ttl: 3600

models:
  base_dir: "./models/base"
  embeddings_dir: "./models/embeddings"
  fine_tuned_dir: "./models/fine-tuned"
  quantized_dir: "./models/quantized"

logging:
  level: "INFO"
  file: "./training/logs/app.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

training:
  output_dir: "./training/checkpoints"
  dataset_dir: "./training/datasets"
  config_dir: "./training/configs"
  log_dir: "./training/logs"